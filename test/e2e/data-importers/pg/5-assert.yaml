apiVersion: kuttl.dev/v1
kind: TestAssert
timeout: 100
collectors:
  - command: kubectl get db/test-pg-cluster -n ${NAMESPACE} -o yaml
  - command: kubectl get perconapgcluster/test-pg-cluster -n ${NAMESPACE} -o yaml
---
apiVersion: v1
kind: Secret
metadata:
  name: test-s3-secret
data:
  AWS_ACCESS_KEY_ID: bWluaW9hZG1pbg==     # minioadmin
  AWS_SECRET_ACCESS_KEY: bWluaW9hZG1pbg== # minioadmin
---
apiVersion: everest.percona.com/v1alpha1
kind: DatabaseCluster
metadata:
  name: test-pg-cluster
spec:
  dataSource:
    dataImport:
      dataImporterName: everest-percona-pg-operator
      source:
        path: "/pg/backup/db/20260618-090032F"
        s3:
          endpointURL: https://minio.minio.svc
          bucket: everest-operator
          region: us-east-1
          credentialsSecretName: test-s3-secret
          verifyTLS: false
          forcePathStyle: true
  engine:
    replicas: 2
    type: postgresql
  proxy:
    replicas: 2
status:
  status: initializing
---
apiVersion: pgv2.percona.com/v2
kind: PerconaPGCluster
metadata:
  name: test-pg-cluster
spec:
  backups:
    enabled: false
    pgbackrest:
      repos: []
  instances:
    - dataVolumeClaimSpec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1G
      name: instance1
      replicas: 2
  proxy:
    pgBouncer:
      replicas: 2
status:
  state: initializing
